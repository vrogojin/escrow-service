name: Docker — publish escrow image

# Only fires on release events; pull-requests and master pushes do NOT trigger
# a publish. This keeps the workflow dormant until an operator cuts a release
# (gh release create vX.Y.Z). Bump the image tag in
# agentic-hosting/config/templates.json after a release lands so spawned
# tenants pick up the new image.
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout escrow-service
        uses: actions/checkout@v6
        with:
          path: escrow-service

      - name: Clone sphere-sdk sibling
        env:
          # Pinned at uxf integration/all-fixes HEAD as of 2026-05-16.
          # Matches the SDK content bundled into the manually-published
          # v0.2 image. Bump alongside any release that needs newer SDK
          # behavior (PR description should call out the new PRs the
          # release picks up).
          #
          # Bump checklist:
          #   1. Set SPHERE_SDK_SHA to the new sphere-sdk commit hash.
          #   2. Verify the SHA is reachable on the public remote
          #      (https://github.com/unicity-sphere/sphere-sdk.git) —
          #      branch heads can move, so prefer pinning to merge
          #      commits on integration/all-fixes or main.
          #   3. Open a PR, run a manual workflow_dispatch test build,
          #      then cut the release tag.
          SPHERE_SDK_SHA: 3a575cd02ff7ab2fc5b2b8696fd8fdfd614779ff
        run: |
          git clone https://github.com/unicity-sphere/sphere-sdk.git sphere-sdk
          git -C sphere-sdk checkout --detach "$SPHERE_SDK_SHA"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          # Build context is the parent directory containing both escrow-service
          # and sphere-sdk siblings (the Dockerfile copies from both).
          context: .
          file: ./escrow-service/Dockerfile
          push: true
          # GHCR namespace MUST match the repo owner — GITHUB_TOKEN scopes
          # are tied to the repo. Currently vrogojin/; switch to
          # unicitynetwork/ once the repo migrates to the org and a PAT or
          # GitHub App is configured for cross-org pushes.
          tags: |
            ghcr.io/vrogojin/agentic-hosting/escrow:${{ github.event.release.tag_name }}
            ghcr.io/vrogojin/agentic-hosting/escrow:latest
